<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details</title>

  <link rel="stylesheet" href="filter.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>

<body>
  <div class ="container">
    <h1>Filter Events</h1>

    <section class = "filter-section">
      <div class = "filter-header">
        <h2 class = "filter-title">Filter Events </h2>
        <button class = "filter-reset" id="reset-filters">Reset Filters</button>
      </div>

      <div class = "filter-group">
        <p class = "filter-group-title">Event Type</p>
        <button class = "filter-btn active" data-filter="category" data-value = "all">All</button>
        <button class = "filter-btn" data-filter="category" data-value = "socials">Socials</button>
        <button class = "filter-btn" data-filter="category" data-value = "workshops">Workshops</button>
        <button class = "filter-btn" data-filter="category" data-value = "athletics">Athletics</button>
      </div>

      <div class = "filter-group">
        <p class = "filter-group-title">Time Period</p>
        <button class = "filter-btn active" data-filter="org" data-value = "all">All</button>
        <button class = "filter-btn" data-filter="org" data-value = "today">Today</button>
        <button class = "filter-btn" data-filter="org" data-value = "week">This Week</button>
        <button class = "filter-btn" data-filter="org" data-value = "month">This Month</button>
      </div>

      <div class = "filter-group">
        <p class = "filter-group-title">Start Time</p>
        <button class = "filter-btn active" data-filter="org" data-value = "all">All</button>
        <button class = "filter-btn" data-filter="org" data-value = "morning">9AM - 12PM</button>
        <button class = "filter-btn" data-filter="org" data-value = "afternoon">12PM - 5PM</button>
        <button class = "filter-btn" data-filter="org" data-value = "evening">5PM - 9PM</button>
      </div>
    </section>
  </div>
</body>
</html>
