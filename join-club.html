<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Club</title>
  <link rel="stylesheet" href="./styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
  <main class="app-screen join-club-page">

    <a href="clubs.html" class="back-btn">
      <span class="material-icons">arrow_back</span>
    </a>

    <section class="join-club-card">
      <h1>Computer Science Society</h1>

      <div class="join-club-image">
        <img src="images/CSS.webp" alt="Club logo">
      </div>

      <p class="club-meeting">
        Meeting: Thursdays 12 PM - 1 PM
      </p>

      <p class="club-location">
        Location: Building 8, Room 104
      </p>

      <p class="club-description">
        This club gives students a chance to meet others with similar interests,
        attend events, work on projects, and get more involved on campus.
      </p>

    <button id="joinClubBtn" class="join-btn" data-club="Computer Science Society">
  Join
</button>
    </section>

  </main>

  <nav class="nav">
    <a href="campus-events.html" class="nav__link">
      <i class="material-icons nav__icon">calendar_today</i>
      <span class="nav__text"></span>
    </a>

    <a href="clubs.html" class="nav__link nav__link--active">
      <i class="material-icons nav__icon">group</i>
      <span class="nav__text"></span>
    </a>

    <a href="addedCSShome.html" class="nav__link">
      <i class="material-icons nav__icon">home</i>
      <span class="nav__text"></span>
    </a>

    <a href="notifications.html" class="nav__link">
      <i class="material-icons nav__icon">notifications</i>
      <span class="nav__text"></span>
    </a>

    <a href="settings.html" class="nav__link">
      <i class="material-icons nav__icon">settings</i>
      <span class="nav__text"></span>
    </a>
  </nav>
</body>
<script>
  const joinButton = document.getElementById("joinClubBtn");

  const clubName = joinButton.dataset.club;

  let joinedClubs = JSON.parse(localStorage.getItem("joinedClubs")) || [];

  /*if (joinedClubs.includes(clubName)) {
    joinButton.textContent = "Joined ✓";
    joinButton.disabled = true;
    joinButton.classList.add("joined");
  }*/

  joinButton.addEventListener("click", function () {
    if (!joinedClubs.includes(clubName)) {
      joinedClubs.push(clubName);
      localStorage.setItem("joinedClubs", JSON.stringify(joinedClubs));
    }

    joinButton.textContent = "Joined ✓";
    joinButton.disabled = true;
    joinButton.classList.add("joined");

    //alert("You joined " + clubName + "!");

  function clearClubs() {
    localStorage.removeItem("joinedClubs");
    document.getElementById("joinedClubs").innerHTML = "";
  }
  });
</script>
</html>
